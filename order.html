<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan Furniture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .btn-submit {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Form Pemesanan Furniture Custom</h2>
            <form action="/submit-order" method="POST">
                <div class="mb-3">
                    <label for="customerName" class="form-label">Nama Pelanggan</label>
                    <input type="text" class="form-control" id="customerName" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Nomor Telepon</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="product" class="form-label">Pilih Produk</label>
                    <select class="form-select" id="product" required>
                        <option value="">-- Pilih Produk --</option>
                        <option value="meja-kayu">Meja Kayu</option>
                        <option value="lemari-kayu">Lemari Kayu</option>
                        <option value="kursi-tamu">Kursi Tamu</option>
                        <option value="rak-buku">Rak Buku</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="customDesign" class="form-label">Desain Custom (opsional)</label>
                    <textarea class="form-control" id="customDesign" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="quantity" class="form-label">Jumlah</label>
                    <input type="number" class="form-control" id="quantity" min="1" required>
                </div>
                <div class="mb-3">
                    <label for="deliveryDate" class="form-label">Tanggal Pengiriman</label>
                    <input type="date" class="form-control" id="deliveryDate" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">Saya setuju dengan syarat dan ketentuan</label>
                </div>
                <button type="submit" class="btn btn-submit w-100">Kirim Pesanan</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
