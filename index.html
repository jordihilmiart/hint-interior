<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Hint Interior</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      color: #111;
    }

    .container {
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .planner {
      display: none;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      margin-right: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .canvas {
      width: 100%;
      height: 400px;
      background: #ddd;
      position: relative;
    }

    .item {
      width: 80px;
      height: 80px;
      background: #333;
      position: absolute;
      cursor: move;
    }

  </style>
</head>
<body>

<header>
  <h1>Hint Interior</h1>
  <div>Dashboard</div>
</header>

<div class="container dashboard" id="dashboard">
  <h2>Pilih Katalog</h2>
  <div class="grid">
    <div class="card" onclick="openPlanner()">Wardrobe</div>
    <div class="card" onclick="openPlanner()">Kitchen Set</div>
    <div class="card" onclick="openPlanner()">Storage</div>
  </div>
</div>

<div class="container planner" id="planner">
  <h2>Custom Furniture</h2>

  <div class="controls">
    <button onclick="addItem()">Tambah Item</button>
    <button onclick="reset()">Reset</button>
    <button onclick="back()">Kembali</button>
  </div>

  <div class="canvas" id="canvas"></div>
</div>

<script>
  function openPlanner() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('planner').style.display = 'block';
  }

  function back() {
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('planner').style.display = 'none';
  }

  function addItem() {
    const item = document.createElement('div');
    item.className = 'item';
    item.style.top = '50px';
    item.style.left = '50px';

    dragElement(item);

    document.getElementById('canvas').appendChild(item);
  }

  function reset() {
    document.getElementById('canvas').innerHTML = '';
  }

  function dragElement(elmnt) {
    let pos1=0,pos2=0,pos3=0,pos4=0;

    elmnt.onmousedown = dragMouseDown;

    function dragMouseDown(e) {
      e.preventDefault();
      pos3 = e.clientX;
      pos4 = e.clientY;
      document.onmouseup = closeDragElement;
      document.onmousemove = elementDrag;
    }

    function elementDrag(e) {
      e.preventDefault();
      pos1 = pos3 - e.clientX;
      pos2 = pos4 - e.clientY;
      pos3 = e.clientX;
      pos4 = e.clientY;
      elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
      elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
    }

    function closeDragElement() {
      document.onmouseup = null;
      document.onmousemove = null;
    }
  }
</script>

</body>
</html>
