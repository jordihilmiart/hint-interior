<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hint Interior Planner</title>

<style>
body { margin:0; font-family:Arial; background:#f6f6f6; }

/* HEADER */
.header {
  height:60px; background:#fff; display:flex;
  align-items:center; justify-content:space-between;
  padding:0 20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* LAYOUT */
.container { display:flex; height:calc(100vh - 60px); }

/* SIDEBAR */
.sidebar {
  width:250px; background:#fff; padding:10px;
  border-right:1px solid #ddd;
}
.item {
  padding:10px; margin-bottom:5px;
  background:#eee; cursor:pointer;
}

/* CANVAS */
.canvas {
  flex:1; position:relative;
  background:
    linear-gradient(#eee 1px, transparent 1px),
    linear-gradient(90deg, #eee 1px, transparent 1px);
  background-size:40px 40px;
}

/* OBJECT */
.box {
  position:absolute;
  background:#333;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:move;
  border-radius:6px;
}

/* PANEL */
.panel {
  width:250px;
  background:#fff;
  border-left:1px solid #ddd;
  padding:10px;
}

button {
  width:100%; margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <b>Hint Interior</b>
  <div>
    <button onclick="save()">Save</button>
    <button onclick="load()">Load</button>
    <button onclick="exportImg()">Export</button>
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="item" onclick="add('Wardrobe',120,200,1500000)">Wardrobe</div>
    <div class="item" onclick="add('Table',150,100,800000)">Table</div>
    <div class="item" onclick="add('Sofa',200,100,1200000)">Sofa</div>
  </div>

  <!-- CANVAS -->
  <div class="canvas" id="canvas"></div>

  <!-- PANEL -->
  <div class="panel">
    <h3>Custom</h3>
    Width: <input id="w" type="number"><br>
    Height: <input id="h" type="number"><br>
    Price: <input id="price" type="number"><br>
    <button onclick="apply()">Apply</button>
    <button onclick="rotate()">Rotate</button>

    <h3>Total</h3>
    <div id="total">0</div>
  </div>

</div>

<script>
let canvas = document.getElementById("canvas");
let selected = null;
let items = [];

// ADD ITEM
function add(name,w,h,price){
  let el = document.createElement("div");
  el.className = "box";
  el.innerText = name;

  el.style.width = w+"px";
  el.style.height = h+"px";
  el.style.left = "50px";
  el.style.top = "50px";

  el.dataset.price = price;

  drag(el);
  select(el);

  canvas.appendChild(el);
  items.push(el);

  updateTotal();
}

// DRAG
function drag(el){
  el.onmousedown = e=>{
    select(el);
    let shiftX = e.clientX - el.offsetLeft;
    let shiftY = e.clientY - el.offsetTop;

    function move(e){
      let x = e.pageX - shiftX;
      let y = e.pageY - shiftY;

      // SNAP GRID
      x = Math.round(x/40)*40;
      y = Math.round(y/40)*40;

      el.style.left = x+"px";
      el.style.top = y+"px";
    }

    document.addEventListener("mousemove", move);

    document.onmouseup = ()=>{
      document.removeEventListener("mousemove", move);
    }
  }
}

// SELECT
function select(el){
  selected = el;
  document.getElementById("w").value = parseInt(el.style.width);
  document.getElementById("h").value = parseInt(el.style.height);
  document.getElementById("price").value = el.dataset.price;
}

// APPLY CUSTOM
function apply(){
  if(!selected) return;
  selected.style.width = w.value+"px";
  selected.style.height = h.value+"px";
  selected.dataset.price = price.value;
  updateTotal();
}

// ROTATE
function rotate(){
  if(!selected) return;
  let w = selected.style.width;
  selected.style.width = selected.style.height;
  selected.style.height = w;
}

// TOTAL PRICE
function updateTotal(){
  let total = 0;
  items.forEach(i=> total += parseInt(i.dataset.price||0));
  document.getElementById("total").innerText = "Rp " + total;
}

// SAVE
function save(){
  let data = items.map(i=>({
    name:i.innerText,
    x:i.style.left,
    y:i.style.top,
    w:i.style.width,
    h:i.style.height,
    price:i.dataset.price
  }));
  localStorage.setItem("design", JSON.stringify(data));
}

// LOAD
function load(){
  canvas.innerHTML="";
  items=[];
  let data = JSON.parse(localStorage.getItem("design")||"[]");

  data.forEach(d=>{
    let el = document.createElement("div");
    el.className="box";
    el.innerText=d.name;

    el.style.left=d.x;
    el.style.top=d.y;
    el.style.width=d.w;
    el.style.height=d.h;
    el.dataset.price=d.price;

    drag(el);
    canvas.appendChild(el);
    items.push(el);
  });

  updateTotal();
}

// EXPORT
function exportImg(){
  alert("Fitur export gambar biasanya butuh library tambahan (html2canvas). Bisa kita upgrade nanti 🔥");
}
</script>

</body>
</html>
