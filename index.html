<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Furniture</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 40px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.product-card {
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #ddd;
}

.product-img {
  height: 200px;
  background: #EDE0CC;
}

.product-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-info {
  padding: 15px;
}

.product-name {
  font-weight: bold;
}

.product-price {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="product-grid">

  <div class="product-card">
    <div class="product-img">
      <img src="furnitur/lemari-2-pintu.jpg">
    </div>
    <div class="product-info">
      <div class="product-name">Lemari 2 Pintu</div>
      <div class="product-price">Rp 4.299.000</div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img">
      <img src="furnitur/rak-buku.jpg">
    </div>
    <div class="product-info">
      <div class="product-name">Rak Buku</div>
      <div class="product-price">Rp 1.499.000</div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img">
      <img src="furnitur/sofa-modular.jpg">
    </div>
    <div class="product-info">
      <div class="product-name">Sofa Modular</div>
      <div class="product-price">Rp 6.999.000</div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img">
      <img src="furnitur/meja-kerja.jpg">
    </div>
    <div class="product-info">
      <div class="product-name">Meja Kerja</div>
      <div class="product-price">Rp 2.199.000</div>
    </div>
  </div>

</div>

</body>
</html>
