<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hint Interior - Furniture Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Kiri - Katalog -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-cube"></i> Hint Interior</h1>
                <p>Furniture Planner Pro</p>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchFurniture" placeholder="Cari furniture...">
            </div>

            <div class="catalog-scroll" id="catalog">
                <!-- Furniture catalog akan di-generate oleh JS -->
            </div>
        </div>

        <!-- Area Utama -->
        <div class="main-area">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="project-info">
                    <h2 id="projectName">Desain Ruang Tamu</h2>
                    <div class="stats">
                        <span id="itemCount">0 furniture</span>
                        <span id="totalPrice">Rp 0</span>
                        <span id="roomSize">0 m²</span>
                    </div>
                </div>
                <div class="top-buttons">
                    <button class="btn" onclick="resetRoom()"><i class="fas fa-redo"></i></button>
                    <button class="btn" onclick="saveDesign()"><i class="fas fa-save"></i></button>
                    <button class="btn primary" onclick="exportDesign()"><i class="fas fa-download"></i> Export</button>
                </div>
            </div>

            <!-- Canvas Ruangan -->
            <div class="canvas-container">
                <canvas id="roomCanvas" width="1200" height="700"></canvas>
                <div class="properties-panel" id="propPanel">
                    <div class="panel-header">
                        <h3>Pengaturan</h3>
                        <button onclick="closePanel()">×</button>
                    </div>
                    <div id="propContent"></div>
                </div>
            </div>
        </div>

        <!-- Sidebar Kanan - Keranjang -->
        <div class="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> Keranjang</h3>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total">
                <div>Total: <span id="grandTotal">Rp 0</span></div>
                <button class="btn primary full" onclick="checkout()">Checkout</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
